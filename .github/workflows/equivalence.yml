name: Equivalence Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'kb.json'
      - 'tools/equivalence/**'
  pull_request:
    paths:
      - 'src/**'
      - 'kb.json'
      - 'tools/equivalence/**'
  schedule:
    # Nightly at 00:00 UTC (midnight). This is the first nightly job; the
    # Progress Report workflow chains off this run's completion (workflow_run)
    # because it reads the artifacts/batch_verify/summary.json produced here.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: false
        default: 'batch'
        type: choice
        options:
          - regression
          - batch
          - discover

env:
  VENV_PYTHON: /mnt/g/dev/halo/.venv/bin/python3
  DELINKED_DIR: /mnt/g/dev/halo/delinked
  BUILD_DIR: /mnt/g/dev/halo/build
  # Directory holding the (host-only, never-committed) .halorec recordings.
  # build_host_snapshots.py reads this; if absent, snapshot-dependent targets SKIP.
  HALO_HALOREC_DIR: /mnt/g/dev/halo-memory-viewer

jobs:
  regression:
    name: Unicorn regression (quick)
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Link local assets
        run: |
          ln -sf ${{ env.DELINKED_DIR }} delinked
          ln -sf ${{ env.BUILD_DIR }} build

      - name: Build host snapshots (copyrighted game memory stays host-only)
        run: ${{ env.VENV_PYTHON }} tools/equivalence/build_host_snapshots.py

      - name: Verify prerequisites
        run: |
          ${{ env.VENV_PYTHON }} -c "import unicorn, capstone; print('ok')"
          test -d delinked
          test -d build

      - name: Run regression tests
        run: |
          set +e
          OUTPUT=$(${{ env.VENV_PYTHON }} tools/equivalence/regression_test.py --quick 2>&1)
          RC=$?
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then
            printf '## ❌ Regression Tests Failed\n\n```\n%s\n```\n' "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          else
            SUMMARY_LINE=$(echo "$OUTPUT" | grep "^Done in")
            printf '## ✅ Regression Tests\n\n```\n%s\n```\n' "$SUMMARY_LINE" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $RC

  batch-verify:
    name: Batch equivalence (${{ github.event.inputs.mode || 'batch' }})
    runs-on: self-hosted
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch')
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Link local assets
        run: |
          ln -sf ${{ env.DELINKED_DIR }} delinked
          ln -sf ${{ env.BUILD_DIR }} build

      - name: Verify prerequisites
        run: |
          ${{ env.VENV_PYTHON }} -c "import unicorn, capstone, z3; print('ok')"
          which llvm-objdump
          test -d delinked
          test -d build

      - name: Determine mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'batch' }}"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          EXTRA_FLAGS=""
          if [ "$MODE" = "discover" ]; then
            EXTRA_FLAGS="--discover"
          fi
          echo "extra_flags=$EXTRA_FLAGS" >> "$GITHUB_OUTPUT"

      - name: Load previous baseline
        id: baseline
        run: |
          BASELINE=""
          if [ -f artifacts/batch_verify/summary.json ]; then
            BASELINE="--baseline artifacts/batch_verify/summary.json"
          fi
          echo "flags=$BASELINE" >> "$GITHUB_OUTPUT"

      # Correctness-safe reuse: exact-key only (no restore-keys), so per-function
      # results are reused ONLY when kb.json + src + the equivalence harness are
      # byte-identical to the run that produced them. Any change busts the cache
      # and forces a fresh recompute (which fits the budget via --jobs), so a
      # changed function never keeps a stale verdict. Survives the checkout
      # git-clean that otherwise wipes the gitignored artifacts/batch_verify/*.json.
      - name: Restore batch-verify result cache
        uses: actions/cache@v4
        with:
          path: artifacts/batch_verify
          key: batch-verify-${{ hashFiles('kb.json', 'src/**', 'tools/equivalence/**') }}

      - name: Run batch verification
        continue-on-error: true
        env:
          # 4 workers on the 15 GB self-hosted box: cap per-child RSS at 3 GB so
          # aggregate peak (jobs * limit = 12 GB) leaves headroom and never OOMs
          # the host (the failure mode that caused GitHub to cancel the nightly).
          HALO_EQUIV_MEM_LIMIT_GB: "3"
        run: |
          ${{ env.VENV_PYTHON }} tools/equivalence/batch_verify.py \
            --seeds 50 \
            --timeout 45 \
            --jobs 4 \
            --max-wall-minutes 105 \
            --csv \
            --skip-existing \
            --allowlist tools/equivalence/batch_verify_allowlist.json \
            --skip-allowlisted \
            ${{ steps.mode.outputs.extra_flags }} \
            ${{ steps.baseline.outputs.flags }} \
            --output-dir artifacts/batch_verify

      - name: Generate progress dashboard
        if: always()
        run: |
          mkdir -p artifacts/progress
          ${{ env.VENV_PYTHON }} tools/report/generate_decomp_report.py \
            --output artifacts/progress/report.json \
            --html artifacts/progress/index.html

      - name: Update historical data
        if: always()
        run: |
          ${{ env.VENV_PYTHON }} tools/report/history.py \
            --add-snapshot artifacts/progress/report.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: equivalence-results-${{ github.run_number }}
          path: |
            artifacts/batch_verify/
            artifacts/progress/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [ -f artifacts/batch_verify/summary.json ]; then
            ${{ env.VENV_PYTHON }} -c "
          import json, sys
          s = json.load(open('artifacts/batch_verify/summary.json'))
          r = s['results']
          elapsed = s.get('elapsed_seconds', 0)
          print('## Equivalence Test Results')
          print()
          print(f'| Metric | Count |')
          print(f'|--------|-------|')
          print(f'| Total candidates | {r[\"total\"]} |')
          print(f'| Pass | {r[\"pass\"]} |')
          print(f'| Fail | {r[\"fail\"]} |')
          print(f'| Error | {r[\"error\"]} |')
          print(f'| Z3 proven | {r[\"z3_proven\"]} |')
          print(f'| Elapsed | {elapsed:.0f}s |')
          if s.get('comparison', {}).get('new_failures'):
              print()
              print('### New Failures (regressions)')
              for f in s['comparison']['new_failures']:
                  nm = f['name']; obj = f['obj']; rsn = f['reason']
                  ed = f.get('error_details', [])
                  print('- **' + nm + '** (' + obj + '): ' + rsn)
                  if ed and rsn in ('emulation_error', 'timeout'):
                      for d in ed[:5]:
                          print('  - `' + d + '`')
                      if len(ed) > 5:
                          print('  - *... and ' + str(len(ed)-5) + ' more*')
          if s.get('comparison', {}).get('known_failures'):
              print()
              print('### Known Failures (cont.)')
              for f in s['comparison']['known_failures']:
                  nm = f['name']; obj = f['obj']; rsn = f['reason']
                  ed = f.get('error_details', [])
                  print('- **' + nm + '** (' + obj + '): ' + rsn)
                  if ed and rsn in ('emulation_error', 'timeout'):
                      for d in ed[:3]:
                          print('  - `' + d + '`')
          " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Triage failures
        if: always()
        run: |
          if [ -f artifacts/batch_verify/summary.json ]; then
            {
              echo "## Failure Triage (auto-classified)"
              echo '```'
              ${{ env.VENV_PYTHON }} tools/equivalence/triage_failures.py \
                --summary-path artifacts/batch_verify/summary.json \
                --details 2>&1 || echo "(triage_failures produced no output)"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
