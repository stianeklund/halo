name: Equivalence Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'kb.json'
      - 'tools/equivalence/**'
  pull_request:
    paths:
      - 'src/**'
      - 'kb.json'
      - 'tools/equivalence/**'
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        required: false
        default: 'batch'
        type: choice
        options:
          - regression
          - batch
          - discover

env:
  VENV_PYTHON: /mnt/g/dev/halo/.venv/bin/python3
  DELINKED_DIR: /mnt/g/dev/halo/delinked
  BUILD_DIR: /mnt/g/dev/halo/build

jobs:
  regression:
    name: Unicorn regression (quick)
    runs-on: self-hosted
    if: github.event_name != 'schedule'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Link local assets
        run: |
          ln -sf ${{ env.DELINKED_DIR }} delinked
          ln -sf ${{ env.BUILD_DIR }} build

      - name: Verify prerequisites
        run: |
          ${{ env.VENV_PYTHON }} -c "import unicorn, capstone; print('ok')"
          test -d delinked
          test -d build

      - name: Run regression tests
        run: |
          set +e
          OUTPUT=$(${{ env.VENV_PYTHON }} tools/equivalence/regression_test.py --quick 2>&1)
          RC=$?
          echo "$OUTPUT"
          if [ $RC -ne 0 ]; then
            printf '## ❌ Regression Tests Failed\n\n```\n%s\n```\n' "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          else
            SUMMARY_LINE=$(echo "$OUTPUT" | grep "^Done in")
            printf '## ✅ Regression Tests\n\n```\n%s\n```\n' "$SUMMARY_LINE" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $RC

  batch-verify:
    name: Batch equivalence (${{ github.event.inputs.mode || 'batch' }})
    runs-on: self-hosted
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch')
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Link local assets
        run: |
          ln -sf ${{ env.DELINKED_DIR }} delinked
          ln -sf ${{ env.BUILD_DIR }} build

      - name: Verify prerequisites
        run: |
          ${{ env.VENV_PYTHON }} -c "import unicorn, capstone, z3; print('ok')"
          which llvm-objdump
          test -d delinked
          test -d build

      - name: Determine mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'batch' }}"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          EXTRA_FLAGS=""
          if [ "$MODE" = "discover" ]; then
            EXTRA_FLAGS="--discover"
          fi
          echo "extra_flags=$EXTRA_FLAGS" >> "$GITHUB_OUTPUT"

      - name: Load previous baseline
        id: baseline
        run: |
          BASELINE=""
          if [ -f artifacts/batch_verify/summary.json ]; then
            BASELINE="--baseline artifacts/batch_verify/summary.json"
          fi
          echo "flags=$BASELINE" >> "$GITHUB_OUTPUT"

      - name: Run batch verification
        continue-on-error: true
        run: |
          ${{ env.VENV_PYTHON }} tools/equivalence/batch_verify.py \
            --seeds 50 \
            --timeout 120 \
            --csv \
            --skip-existing \
            --allowlist tools/equivalence/batch_verify_allowlist.json \
            ${{ steps.mode.outputs.extra_flags }} \
            ${{ steps.baseline.outputs.flags }} \
            --output-dir artifacts/batch_verify

      - name: Generate progress dashboard
        if: always()
        run: |
          mkdir -p artifacts/progress
          ${{ env.VENV_PYTHON }} tools/report/generate_decomp_report.py \
            --output artifacts/progress/report.json \
            --html artifacts/progress/index.html

      - name: Update historical data
        if: always()
        run: |
          ${{ env.VENV_PYTHON }} tools/report/history.py \
            --add-snapshot artifacts/progress/report.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: equivalence-results-${{ github.run_number }}
          path: |
            artifacts/batch_verify/
            artifacts/progress/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [ -f artifacts/batch_verify/summary.json ]; then
            ${{ env.VENV_PYTHON }} -c "
          import json, sys
          s = json.load(open('artifacts/batch_verify/summary.json'))
          r = s['results']
          elapsed = s.get('elapsed_seconds', 0)
          print('## Equivalence Test Results')
          print()
          print(f'| Metric | Count |')
          print(f'|--------|-------|')
          print(f'| Total candidates | {r[\"total\"]} |')
          print(f'| Pass | {r[\"pass\"]} |')
          print(f'| Fail | {r[\"fail\"]} |')
          print(f'| Error | {r[\"error\"]} |')
          print(f'| Z3 proven | {r[\"z3_proven\"]} |')
          print(f'| Elapsed | {elapsed:.0f}s |')
          if s.get('comparison', {}).get('new_failures'):
              print()
              print('### New Failures (regressions)')
              for f in s['comparison']['new_failures']:
                  print(f'- **{f[\"name\"]}** ({f[\"obj\"]}): {f[\"reason\"]}')
          " >> "$GITHUB_STEP_SUMMARY"
          fi
