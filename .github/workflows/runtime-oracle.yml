name: Runtime Oracle Tests

on:
  # NOTE: no `push:` trigger by design. This workflow DEPLOYS to the shared
  # dev Xbox and would poison its state on every push to main (a real incident:
  # "rogue runner deploys harness builds"). Run it only on the nightly schedule
  # or via explicit manual dispatch.
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Optional target limit (0 = all)'
        required: false
        default: '0'
      skip_build:
        description: 'Reuse existing built XBE when possible'
        required: false
        default: false
        type: boolean

env:
  VENV_PYTHON: /mnt/g/dev/halo/.venv/bin/python3

jobs:
  runtime-oracle:
    name: Nightly runtime oracle
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Link host assets
        run: |
          ln -sfn /mnt/g/dev/halo/halo-patched "$GITHUB_WORKSPACE/halo-patched"

      - name: Verify prerequisites
        run: |
          ${{ env.VENV_PYTHON }} -c "print('ok')"
          which cmake

      - name: Assert-target detector (system_exit vs halt_and_catch_fire)
        run: |
          # Static capstone sweep: every ported function's assert tails must
          # CALL the same terminator the pristine XBE does. Needs the XBE, which
          # only exists on self-hosted (symlinked above) — that is why this gate
          # lives here and not in the GitHub-hosted main.yml (where it would
          # silently skip). Defer failure to the final gate, matching this
          # workflow's continue-and-report design.
          set +e
          OUTPUT=$(${{ env.VENV_PYTHON }} tools/audit/check_assert_targets.py --check 2>&1)
          RC=$?
          echo "$OUTPUT"
          echo "ASSERT_TARGETS_RC=$RC" >> "$GITHUB_ENV"
          if [ $RC -ne 0 ]; then
            printf '## ❌ Assert-target swaps detected\n\n```\n%s\n```\n' "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          else
            printf '## ✅ Assert-target detector\n\nNo system_exit/halt_and_catch_fire swaps in ported functions.\n' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Run runtime-oracle batch
        continue-on-error: true
        run: |
          LIMIT="${{ github.event.inputs.limit || '0' }}"
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.skip_build || 'false' }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --skip-build"
          fi
          set +e
          ${{ env.VENV_PYTHON }} tools/verify/runtime_oracle_batch.py \
            --limit "$LIMIT" \
            --csv \
            $EXTRA_FLAGS
          RC=$?
          echo "RUNTIME_ORACLE_RC=$RC" >> "$GITHUB_ENV"
          exit 0

      - name: Generate progress dashboard artifact
        if: always()
        run: |
          mkdir -p artifacts/progress
          ${{ env.VENV_PYTHON }} tools/report/generate_decomp_report.py \
            --output artifacts/progress/report.json \
            --html artifacts/progress/index.html

      - name: Update historical data
        if: always()
        run: |
          ${{ env.VENV_PYTHON }} tools/report/history.py \
            --add-snapshot artifacts/progress/report.json

      - name: Upload runtime-oracle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-oracle-${{ github.run_number }}
          path: |
            artifacts/runtime_oracle/
            artifacts/runtime_oracle_batch/
            artifacts/progress/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          LATEST=$(ls -1dt artifacts/runtime_oracle_batch/* 2>/dev/null | head -n 1)
          if [ -n "$LATEST" ] && [ -f "$LATEST/summary.json" ]; then
            LATEST_SUMMARY="$LATEST/summary.json" ${{ env.VENV_PYTHON }} tools/report/runtime_oracle_summary.py >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on runtime-oracle regressions
        if: always()
        run: |
          test "${ASSERT_TARGETS_RC:-1}" = "0"
          test "${RUNTIME_ORACLE_RC:-1}" = "0"
